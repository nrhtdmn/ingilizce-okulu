<style>
  :root {
    --bg: #f5f2eb;
    --card: #ffffff;
    --accent: #1a5c96;
    --accent2: #c8392b;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2ddd4;
    --tag-bg: #e8f0f9;
    --tag-text: #1a5c96;
    --shadow: 0 2px 12px rgba(26,92,150,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--accent);
    color: white;
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 0.5rem;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  header h1 span { color: #7ec8f7; }
  header p {
    font-size: 0.92rem;
    opacity: 0.8;
    max-width: 560px;
    line-height: 1.6;
  }
  .header-stats {
    display: flex;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: #7ec8f7;
  }
  .stat-label {
    font-size: 0.72rem;
    opacity: 0.65;
    letter-spacing: 0.05em;
  }

  /* CONTROLS */
  .controls {
    max-width: 1100px;
    margin: 2rem auto 1rem;
    padding: 0 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  input[type="search"] {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--accent); }

  .filter-btns {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Sora', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* GRID */
  .grid {
    max-width: 1100px;
    margin: 0 auto 3rem;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 1.4rem 1rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    box-shadow: var(--shadow);
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    cursor: pointer;
    animation: fadeIn 0.4s ease both;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(26,92,150,0.13);
    border-color: var(--accent);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-code {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    align-self: flex-start;
  }

  .card-img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    border-radius: 6px;
  }
  .card-img-placeholder {
    width: 90px;
    height: 90px;
    background: var(--bg);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    border: 1px dashed var(--border);
  }

  .card-tr {
    font-size: 0.84rem;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    line-height: 1.35;
  }
  .card-gr {
    font-size: 0.74rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    font-family: 'Noto Serif', serif;
    line-height: 1.4;
  }

  .card.hidden { display: none; }

  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 18px;
    padding: 2rem;
    max-width: 460px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }
  .modal-code {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .modal-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    display: block;
    margin: 0 auto 1rem;
  }
  .modal-tr {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.4rem;
    color: var(--text);

  .modal-gr {
    font-size: 0.88rem;
    color: var(--muted);
    text-align: center;
    font-family: 'Noto Serif', serif;
    font-style: italic;

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>

const wikiBase = "https://upload.wikimedia.org/wikipedia/commons/thumb/";
/** Bu sayfa pages/ içinde; kökteki assets/images (r1… dosya adları) */
const assetImgDir = "../assets/images/";

/**
 * Yerel: r101, r1001, r1-1, r1_P-1a vb. → sonra Wikimedia.
 * indexInSigns: signs dizisindeki 0 tabanlı sıra (dosya adı genelde bu sırayla eşleşir).
 */
function buildImageUrlCandidates(s, indexInSigns) {
  var n = indexInSigns + 1;
  var exts = [".webp", ".png", ".jpg", ".jpeg", ".svg"];
  var codeSlug = String(s.code || "")
    .replace(/α/g, "a")
    .replace(/β/g, "b")
    .replace(/[^\w\-]/g, "");
  var tail = (s.img || "").split("/").pop() || "";
  var commonsName = tail.replace(/^120px-/, "");

  var names = [
    "r1" + String(n).padStart(2, "0"),
    "r1" + String(n).padStart(3, "0"),
    "r1" + String(n).padStart(4, "0"),
    "r1-" + n,
    "r1_" + n,
    "r1-" + s.code,
    "r1_" + codeSlug,
    "r1" + n
  ];
  if (commonsName) names.push(commonsName);

  var seen = {};
  var urls = [];
  names.forEach(function (name) {
    if (!name) return;
    exts.forEach(function (ext) {
      var u = assetImgDir + name + ext;
      if (!seen[u]) {
        seen[u] = 1;
        urls.push(u);
      }
    });
  });
  urls.push(wikiBase + s.img);
  return urls;
}

function loadImgWithFallback(imgEl, candidates, onFail) {
  var i = 0;
  function next() {
    if (i >= candidates.length) {
      if (typeof onFail === "function") onFail();
      return;
    }
    var u = candidates[i++];
    imgEl.onerror = next;
    imgEl.onload = function () {
      imgEl.onerror = null;
      imgEl.onload = null;
    };
    imgEl.src = u;
  }
  next();
}

let currentCat = 'all';

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const q = document.getElementById('search').value.toLowerCase();
  let count = 0;

  signs.forEach((s, i) => {
    const matchCat = currentCat === 'all' || s.cat === currentCat;
    const matchQ = !q || s.code.toLowerCase().includes(q) || s.tr.toLowerCase().includes(q) || s.gr.toLowerCase().includes(q);
    if (!matchCat || !matchQ) return;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (count * 0.03) + 's';
    card.onclick = () => openModal(i);

    var candidates = buildImageUrlCandidates(s, i);
    card.innerHTML = `
      <div class="card-code">${s.code}</div>
      <img class="card-img" src="" alt="${s.code}">
      <div class="card-tr">${s.tr}</div>
      <div class="card-gr">${truncate(s.gr, 60)}</div>
    `;
    var cimg = card.querySelector(".card-img");
    loadImgWithFallback(cimg, candidates, function () {
      cimg.outerHTML =
        "<div class='card-img-placeholder'>" + s.code + "<br>görsel yok</div>";
    });
    grid.appendChild(card);
    count++;
  });

  if (count === 0) {
    grid.innerHTML = '<div class="empty">Sonuç bulunamadı.</div>';
  }
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function filterCards() { buildCards(); }

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards();
}

function openModal(idx) {
  const s = signs[idx];
  document.getElementById('modal-code').textContent = s.code;
  const imgEl = document.getElementById('modal-img');
  imgEl.style.display = 'block';
  var candidates = buildImageUrlCandidates(s, idx);
  loadImgWithFallback(imgEl, candidates, function () {
    imgEl.style.display = 'none';
  });
  document.getElementById('modal-tr').textContent = s.tr;
  document.getElementById('modal-gr').textContent = s.gr;
  document.getElementById('modal-desc').textContent = s.desc;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e, force) {
  if (force || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(null, true); });

buildCards();
</script>
